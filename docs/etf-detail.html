<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">ETF 詳細分析 | 投資分析儀表板</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .back-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: #5568d3;
        }

        header h1 {
            color: #333;
            font-size: 2em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
        }

        /* Price Display */
        .price-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            text-align: center;
        }

        .current-price {
            font-size: 3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .price-info {
            font-size: 1.1em;
            opacity: 0.9;
        }

        /* Windows */
        .windows-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .window-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .window-card h3 {
            color: #667eea;
            font-size: 1.3em;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
        }

        .metric-value {
            font-weight: bold;
            color: #333;
        }

        .positive {
            color: #22c55e;
        }

        .negative {
            color: #ef4444;
        }

        .neutral {
            color: #f59e0b;
        }

        /* Chart */
        .chart-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .chart-section h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .chart-image {
            width: 100%;
            height: auto;
            border-radius: 5px;
            background: #f8f9fa;
        }

        /* Footer */
        footer {
            background: white;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #666;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.5em;
            }

            .current-price {
                font-size: 2em;
            }

            .windows-grid {
                grid-template-columns: 1fr;
            }

            .header-top {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            padding: 20px;
            border-radius: 5px;
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="header-top">
                <button class="back-btn" onclick="history.back()">← 返回儀表板</button>
            </div>
            <h1 id="ticker" style="color: #667eea; font-size: 2.5em;">ETF</h1>
            <p id="subtitle">詳細分析</p>
        </header>

        <!-- Price Display -->
        <div class="price-display" id="priceDisplay">
            <div class="loading">載入中...</div>
        </div>

        <!-- Time Windows -->
        <div class="windows-grid" id="windowsGrid">
            <div class="loading">載入中...</div>
        </div>

        <!-- Chart -->
        <div class="chart-section" id="chartSection" style="display: none;">
            <h2>📈 價格走勢圖</h2>
            <img id="chartImage" class="chart-image" alt="價格圖表">
        </div>

        <!-- Footer -->
        <footer>
            <p><a href="index.html">← 返回主儀表板</a></p>
            <p style="margin-top: 15px; font-size: 0.9em;">
                © 2026 投資分析系統
            </p>
        </footer>
    </div>

    <script>
        // 從 URL 取得 ticker
        const urlParams = new URLSearchParams(window.location.search);
        const ticker = urlParams.get('ticker') || 'VT';

        // 載入數據
        async function loadDetail() {
            try {
                const response = await fetch('data/etf_results/etf_tracker_latest.json');
                if (!response.ok) throw new Error('無法載入數據');
                
                const data = await response.json();
                
                if (!data[ticker]) {
                    throw new Error(`找不到 ${ticker} 的數據`);
                }

                const tickerData = data[ticker];
                renderDetail(tickerData);
                loadChart();

            } catch (error) {
                document.getElementById('priceDisplay').innerHTML = `
                    <div class="error">
                        ❌ 載入失敗：${error.message}
                    </div>
                `;
            }
        }

        // 渲染詳細信息
        function renderDetail(data) {
            // 更新標題
            document.getElementById('ticker').textContent = ticker;
            document.getElementById('pageTitle').textContent = `${ticker} 詳細分析 | 投資分析儀表板`;

            // 當前價格
            const currentPrice = data['當前價格'];
            const updateTime = data['更新時間'];
            
            document.getElementById('priceDisplay').innerHTML = `
                <div class="current-price">$${currentPrice.toFixed(2)}</div>
                <div class="price-info">
                    最後更新：${updateTime}
                </div>
            `;

            // 時間窗口卡片
            const windows = [
                { key: '1M', label: '1 個月' },
                { key: '3M', label: '3 個月' },
                { key: '6M', label: '6 個月' },
                { key: '1Y', label: '1 年' },
                { key: 'YTD', label: '年初至今' },
                { key: '3Y', label: '3 年' }
            ];

            let html = '';
            windows.forEach(window => {
                const key = window.key;
                const high = data[`H_${key}`];
                const highDate = data[`H_Date_${key}`];
                const fromHigh = data[`From_H_%_${key}`];
                const low = data[`L_${key}`];
                const lowDate = data[`L_Date_${key}`];
                const fromLow = data[`From_L_%_${key}`];

                if (high !== undefined) {
                    const highColor = fromHigh > 0 ? 'positive' : 'negative';
                    const lowColor = fromLow > 5 ? 'positive' : fromLow > 0 ? 'neutral' : 'negative';

                    html += `
                        <div class="window-card">
                            <h3>${window.label}</h3>
                            <div class="metric-row">
                                <span class="metric-label">高點</span>
                                <span class="metric-value">$${high.toFixed(2)}</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">高點日期</span>
                                <span class="metric-value" style="font-size: 0.9em;">${highDate}</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">距離高點</span>
                                <span class="metric-value ${highColor}">
                                    ${fromHigh > 0 ? '+' : ''}${fromHigh.toFixed(2)}%
                                </span>
                            </div>
                            <hr style="margin: 15px 0; border: none; border-top: 1px solid #f0f0f0;">
                            <div class="metric-row">
                                <span class="metric-label">低點</span>
                                <span class="metric-value">$${low.toFixed(2)}</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">低點日期</span>
                                <span class="metric-value" style="font-size: 0.9em;">${lowDate}</span>
                            </div>
                            <div class="metric-row">
                                <span class="metric-label">距離低點</span>
                                <span class="metric-value ${lowColor}">
                                    ${fromLow > 0 ? '+' : ''}${fromLow.toFixed(2)}%
                                </span>
                            </div>
                        </div>
                    `;
                }
            });

            document.getElementById('windowsGrid').innerHTML = html;
        }

        // 載入圖表
        function loadChart() {
            const chartImg = document.getElementById('chartImage');
            const chartSection = document.getElementById('chartSection');
            const today = new Date();
            const dateStr = today.getFullYear() + 
                           String(today.getMonth() + 1).padStart(2, '0') + 
                           String(today.getDate()).padStart(2, '0');
            
            const chartPath = `data/etf_results/etf_tracker_${dateStr}.png`;

            fetch(chartPath, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        chartImg.src = chartPath;
                        chartSection.style.display = 'block';
                    }
                })
                .catch(() => {
                    // 圖表不存在，隱藏部分
                });
        }

        // 頁面加載時執行
        window.addEventListener('load', loadDetail);
    </script>
</body>
</html>
