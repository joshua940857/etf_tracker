<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投資分析儀表板 | Momentum + ETF 追蹤</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header */
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        header h1 {
            color: #333;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            color: #666;
            font-size: 1.1em;
        }

        .update-time {
            color: #999;
            font-size: 0.9em;
            margin-top: 10px;
        }

        /* Main Grid */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
        }

        .card h2 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 15px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        /* ETF Cards */
        .etf-card {
            border-left: 5px solid #667eea;
        }

        .etf-ticker {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .price-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .price-label {
            color: #999;
            font-size: 0.9em;
        }

        .price-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
        }

        .price-date {
            color: #999;
            font-size: 0.8em;
            margin-top: 5px;
        }

        /* Metrics Grid */
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .metric {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
        }

        .metric-label {
            color: #999;
            font-size: 0.85em;
            margin-bottom: 5px;
        }

        .metric-value {
            font-size: 1.3em;
            font-weight: bold;
        }

        /* Colors for positive/negative */
        .positive {
            color: #22c55e;
        }

        .negative {
            color: #ef4444;
        }

        .neutral {
            color: #f59e0b;
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }

        /* Status */
        .status {
            background: #f0fdf4;
            border-left: 4px solid #22c55e;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .status.warning {
            background: #fefce8;
            border-left-color: #eab308;
        }

        .status.error {
            background: #fef2f2;
            border-left-color: #ef4444;
        }

        /* Charts */
        .chart-container {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .chart-container h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .chart-image {
            width: 100%;
            height: auto;
            border-radius: 5px;
            background: #f8f9fa;
        }

        /* Footer */
        footer {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            color: #666;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        footer a {
            color: #667eea;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }

        /* Responsive */
        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .dashboard {
                grid-template-columns: 1fr;
            }

            .metrics {
                grid-template-columns: 1fr;
            }
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📊 投資分析儀表板</h1>
            <p>Momentum 系統 + ETF 高低點追蹤</p>
            <div class="update-time">
                <span id="lastUpdate">最後更新：載入中...</span>
            </div>
        </header>

        <!-- Status -->
        <div id="statusArea" class="status">
            ⏳ 正在載入數據...
        </div>

        <!-- Main Dashboard -->
        <div class="dashboard" id="dashboardContent">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在載入最新數據...</p>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="chart-container" id="chartsSection" style="display: none;">
            <h3>📈 ETF 走勢圖表</h3>
            <img id="chartImage" class="chart-image" alt="ETF 圖表" style="display: none;">
            <p id="chartLoading">載入圖表中...</p>
        </div>

        <!-- Details Section -->
        <div class="chart-container">
            <h3>📋 詳細數據</h3>
            <div class="button-group">
                <a href="data/analysis_results/summary_report.txt" class="btn btn-primary" target="_blank">
                    📄 查看摘要報告
                </a>
                <a href="data/analysis_results/execution_log.txt" class="btn btn-primary" target="_blank">
                    🔍 查看執行日誌
                </a>
                <a href="data/etf_results/etf_tracker_latest.csv" class="btn btn-primary" target="_blank">
                    📊 下載 CSV 數據
                </a>
                <a href="data/etf_results/etf_tracker_latest.json" class="btn btn-primary" target="_blank">
                    🔗 下載 JSON 數據
                </a>
            </div>
        </div>

        <!-- Footer -->
        <footer>
            <p>自動更新於：每週一至五 09:30 UTC（台北時間 17:30）</p>
            <p>
                <a href="https://github.com" target="_blank">GitHub 倉庫</a> | 
                <a href="data/" target="_blank">數據目錄</a> | 
                <a href="about.html" target="_blank">關於本儀表板</a>
            </p>
            <p style="margin-top: 15px; font-size: 0.9em;">
                © 2026 投資分析系統 | 由 GitHub Actions 自動生成
            </p>
        </footer>
    </div>

    <script>
        // 載入並顯示 ETF 數據
        async function loadDashboard() {
            try {
                // 嘗試載入 JSON 數據
                const response = await fetch('data/etf_results/etf_tracker_latest.json');
                
                if (!response.ok) {
                    throw new Error('無法載入數據');
                }

                const data = await response.json();
                renderDashboard(data);
                
                // 載入圖表
                loadChart();
                
                // 更新最後更新時間
                updateLastUpdateTime();
                
                // 更新狀態
                updateStatus('success');

            } catch (error) {
                console.error('載入數據失敗:', error);
                document.getElementById('dashboardContent').innerHTML = `
                    <div class="status error" style="grid-column: 1/-1;">
                        ❌ 無法載入數據：${error.message}
                        <br><br>
                        <small>請確保已運行分析系統並將結果推送到 GitHub。</small>
                    </div>
                `;
                updateStatus('error');
            }
        }

        // 渲染儀表板
        function renderDashboard(data) {
            const tickers = ['VT', 'VOO', 'VTI'];
            let html = '';

            tickers.forEach(ticker => {
                if (data[ticker]) {
                    const tickerData = data[ticker];
                    html += createETFCard(ticker, tickerData);
                }
            });

            document.getElementById('dashboardContent').innerHTML = html;
        }

        // 建立 ETF 卡片
        function createETFCard(ticker, data) {
            const price = data['當前價格'];
            const updateTime = data['更新時間'];
            const from_high_1y = data['From_H_%_1Y'] || 0;
            const from_low_1y = data['From_L_%_1Y'] || 0;
            const high_1y = data['H_1Y'] || 0;
            const low_1y = data['L_1Y'] || 0;

            const highColor = from_high_1y > 0 ? 'positive' : 'negative';
            const lowColor = from_low_1y > 5 ? 'positive' : from_low_1y > 0 ? 'neutral' : 'negative';

            return `
                <div class="card etf-card">
                    <div class="etf-ticker">${ticker}</div>
                    
                    <div class="price-info">
                        <div class="price-label">當前價格</div>
                        <div class="price-value">$${price.toFixed(2)}</div>
                        <div class="price-date">${updateTime}</div>
                    </div>

                    <div class="metrics">
                        <div class="metric">
                            <div class="metric-label">1Y 高點</div>
                            <div class="metric-value">$${high_1y.toFixed(2)}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">距離高點</div>
                            <div class="metric-value ${highColor}">
                                ${from_high_1y > 0 ? '+' : ''}${from_high_1y.toFixed(2)}%
                            </div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">1Y 低點</div>
                            <div class="metric-value">$${low_1y.toFixed(2)}</div>
                        </div>
                        <div class="metric">
                            <div class="metric-label">距離低點</div>
                            <div class="metric-value ${lowColor}">
                                ${from_low_1y > 0 ? '+' : ''}${from_low_1y.toFixed(2)}%
                            </div>
                        </div>
                    </div>

                    <div class="button-group">
                        <a href="etf-detail.html?ticker=${ticker}" class="btn btn-secondary">
                            查看詳細
                        </a>
                    </div>
                </div>
            `;
        }

        // 載入圖表
        function loadChart() {
            const chartImg = document.getElementById('chartImage');
            const chartContainer = document.getElementById('chartsSection');
            const chartLoading = document.getElementById('chartLoading');

            // 嘗試載入最新的圖表
            const today = new Date();
            const dateStr = today.getFullYear() + 
                           String(today.getMonth() + 1).padStart(2, '0') + 
                           String(today.getDate()).padStart(2, '0');
            
            const chartPath = `data/etf_results/etf_tracker_${dateStr}.png`;

            // 檢查圖表是否存在
            fetch(chartPath, { method: 'HEAD' })
                .then(response => {
                    if (response.ok) {
                        chartImg.src = chartPath;
                        chartImg.style.display = 'block';
                        chartLoading.style.display = 'none';
                        chartContainer.style.display = 'block';
                    } else {
                        chartLoading.textContent = '圖表暫無';
                    }
                })
                .catch(() => {
                    chartLoading.textContent = '圖表暫無';
                });
        }

        // 更新最後更新時間
        function updateLastUpdateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-TW', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('lastUpdate').textContent = `最後更新：${timeStr}`;
        }

        // 更新狀態
        function updateStatus(status) {
            const statusArea = document.getElementById('statusArea');
            if (status === 'success') {
                statusArea.innerHTML = '✅ 數據已成功載入';
                statusArea.classList.remove('warning', 'error');
            } else if (status === 'error') {
                statusArea.innerHTML = '❌ 數據載入失敗，請稍後重試';
                statusArea.classList.add('error');
            }
        }

        // 頁面加載時執行
        window.addEventListener('load', () => {
            loadDashboard();
            // 每 5 分鐘自動刷新
            setInterval(loadDashboard, 5 * 60 * 1000);
        });
    </script>
</body>
</html>
